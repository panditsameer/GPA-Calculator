kind = "web"
previewPath = "/"
title = "NEB GPA Calculator"
version = "1.0.0"
id = "artifacts/neb-gpa-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20910
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/neb-gpa-calculator run dev"

[services.env]
PORT = "20910"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/neb-gpa-calculator", "run", "build"]
publicDir = "artifacts/neb-gpa-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
